<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdncdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://stackpath.bootstrapcdncdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <style>
        .container {
                        background-image: linear-gradient(to bottom black mintcream);
        }
        .row {
                background-color: red;
                color: aliceblue;
        }
        .rows {
                    background-color: orangered;
                    color: antiquewhite;
        }
    </style>
    <title>Unequal Grid</title>
</head>
<body>
        <div class="container"> 
        <div class="row">
            <div class="col-md-4">
                Column 1 
            </div>
            <div class="col-md-8">
                Column 2 
            </div>
        </div>
        <div class="rows"> 
            <div class="col-md-6">
                Column 3 
            </div>
            <div class="col-md-3">
                Column 4 
            </div>
            <div class="col-md-3">
                Column 5 
            </div>
        </div>
    </div>
</body>
</html>
