<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdncdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://stackpath.bootstrapcdncdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <title>Bootstrap Grid System</title>
    <style>
        .col {
            text-align: center;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h3>Equal Width Column Grid</h3>
    <div class="container">
        <div class="row">
            <div class="col">
                column 1
            </div>
            <div class="col">
                column 2 
            </div>
            <div class="col">
                column 3
            </div>
        </div>
    </div>
</body>
</html>
